<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>クイズ 管理者用</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <main class="container">
    <h1>管理者画面</h1>

    <section class="card">
      <h2>登録済み問題から出題</h2>

      <select id="questionSetSelect">
        <option value="common">学年共通</option>
        <option value="grade1">1年</option>
        <option value="grade2">2年</option>
        <option value="grade3">3年</option>
      </select>

      <select id="presetQuestionSelect">
        <option value="">問題を選択</option>
      </select>

      <button id="setPresetQuestionBtn">選んだ問題を提示</button>
    </section>

    <section class="card">
      <details>
        <summary>その場で問題を作成</summary>

        <input id="questionInput" type="text" placeholder="問題文">
        <input id="choice1" type="text" placeholder="選択肢1">
        <input id="choice2" type="text" placeholder="選択肢2">
        <input id="choice3" type="text" placeholder="選択肢3">
        <input id="choice4" type="text" placeholder="選択肢4">

        <select id="answerSelect">
          <option value="">正解を選択</option>
          <option value="1">選択肢1</option>
          <option value="2">選択肢2</option>
          <option value="3">選択肢3</option>
          <option value="4">選択肢4</option>
        </select>

        <button id="setQuestionBtn">問題開始</button>
      </details>
    </section>

    <section class="card">
      <h2>進行操作</h2>
      <button id="closeBtn">締め切り</button>
      <button id="showAnswersBtn">回答を表示</button>
      <button id="markBtn">採点する</button>
      <button id="scorePageBtn">得点画面へ</button>
      <button id="resetAllBtn" class="danger">全リセット</button>
    </section>

    <section class="card">
      <h2>現在の状態</h2>
      <p id="statusText">読み込み中...</p>
      <h3 id="currentQuestionText"></h3>
    </section>

    <section class="card">
      <h2>回答状況</h2>
      <div id="answersArea"></div>
    </section>
  </main>

  <script type="module" src="js/admin.js"></script>
</body>
</html>
